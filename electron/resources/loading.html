<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netbox</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2937, #0f172a);
        color: #f8fafc;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 600;
      }

      p {
        margin: 0;
        opacity: 0.8;
      }

      .spinner {
        width: 2rem;
        height: 2rem;
        margin: 1.5rem auto 0;
        border: 3px solid rgba(248, 250, 252, 0.2);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Netbox</h1>
      <p>Starting the local monitor…</p>
      <div class="spinner" aria-hidden="true"></div>
    </main>
  </body>
</html>
