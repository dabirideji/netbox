<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netbox</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --surface: #111113;
        --line: rgb(255 255 255 / 0.08);
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --radius: 10px;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        -webkit-user-select: none;
        user-select: none;
      }

      .splash {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        height: 100%;
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: 0 16px 36px rgb(0 0 0 / 0.42);
        -webkit-app-region: drag;
      }

      .splash__logo {
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        object-fit: contain;
      }

      .splash__copy {
        min-width: 0;
        flex: 1;
      }

      .splash__title {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--text);
        line-height: 1.2;
      }

      .splash__status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .splash__spinner {
        flex-shrink: 0;
        width: 12px;
        height: 12px;
        border: 2px solid rgb(255 255 255 / 0.12);
        border-top-color: var(--text);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash" role="status" aria-live="polite" aria-label="Netbox is starting">
      <img class="splash__logo" src="logo.png" width="36" height="36" alt="" />
      <div class="splash__copy">
        <p class="splash__title">Netbox</p>
        <p class="splash__status">
          <span class="splash__spinner" aria-hidden="true"></span>
          <span>Starting local monitor</span>
        </p>
      </div>
    </div>
  </body>
</html>
