appId: com.netbox.monitor
productName: Netbox
copyright: Copyright © 2026 Netbox
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - resources/**
  - package.json
extraResources:
  - from: ../dist-backend
    to: backend
    filter:
      - "**/*"
  - from: ../frontend/dist
    to: frontend/dist
    filter:
      - "**/*"
  - from: ../config
    to: config
    filter:
      - "**/*"
asar: true
mac:
  icon: build/icon.png
  category: public.app-category.utilities
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  icon: build/icon.png
  target:
    - nsis
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  category: Network
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish: null
